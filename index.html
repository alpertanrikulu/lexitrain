<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#0b0b10" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta
      name="description"
      content="Lexitrain — a premium adaptive English vocabulary trainer. CEFR A1–C2. Fully client-side."
    />
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <title>Lexitrain — Adaptive English Vocabulary</title>
    <script>
      // Pre-paint dark-mode resolver to prevent FOUC.
      (() => {
        try {
          const saved = localStorage.getItem("lexitrain.theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const dark = saved ? saved === "dark" : prefersDark;
          document.documentElement.classList.toggle("dark", dark);
        } catch {}
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
